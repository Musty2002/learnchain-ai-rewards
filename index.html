<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/app-icon-1024.png" type="image/png" />
    <link rel="apple-touch-icon" href="/app-icon-1024.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#9b87f5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LearnChain" />
    
    <!-- Splash Screen -->
    <link rel="apple-touch-startup-image" href="/splash-screen.png" />
    <title>LearnChain - AI-Powered Learning with Crypto Rewards</title>
    <meta name="description" content="Master new skills with AI mentorship and earn LearnChain Tokens (LCT). Take personalized courses, complete quizzes, and get rewarded for your learning journey." />
    <meta name="author" content="LearnChain" />

    <meta property="og:title" content="LearnChain - AI-Powered Learning with Crypto Rewards" />
    <meta property="og:description" content="Master new skills with AI mentorship and earn LearnChain Tokens (LCT). Take personalized courses, complete quizzes, and get rewarded for your learning journey." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lovable_dev" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    
    <!-- Mobile Optimization -->
    <style>
      /* Fix for mobile viewport height */
      html, body {
        height: 100vh;
        height: -webkit-fill-available;
      }
      #root {
        min-height: 100vh;
        min-height: -webkit-fill-available;
      }
    </style>
    
    <script>
      // Polyfill Node's `global` for browser dependencies (e.g., simple-peer/randombytes)
      if (typeof window !== 'undefined' && typeof window.global === 'undefined') {
        window.global = window;
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for offline functionality
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registered:', reg.scope))
            .catch(err => console.log('Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
